- name: generate snake svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: devbiax
          outputs: |
            dist/snake.svg?color_snake=#e04486&color_dots=#333333,#b03a73,#e04486,#8e2d5c

      - name: push snake svg to github-pages
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output # <-- Isso aqui tem que ser IGUAL ao link do README
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
